<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'; img-src 'self' data:;" />
    <title>Identify</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        user-select: none;
        cursor: none;
      }
      html,
      body {
        width: 100%;
        min-width: 100%;
        height: 100%;
        min-height: 100%;
        overflow: hidden;
        background: #05070d;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif;
        color: #eaf2ff;
        overscroll-behavior: none;
      }
      /* Slowly pulsing blue backdrop. */
      #backdrop {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: clamp(24px, 6vmin, 64px);
        background: linear-gradient(180deg, #06101d 0%, #05070d 100%);
        overflow: hidden;
        isolation: isolate;
      }
      #backdrop::before,
      #backdrop::after {
        content: '';
        position: absolute;
        inset: -10%;
        pointer-events: none;
      }
      #backdrop::before {
        background-image:
          linear-gradient(rgba(140, 190, 255, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(140, 190, 255, 0.08) 1px, transparent 1px),
          radial-gradient(circle at 50% 45%, rgba(86, 151, 255, 0.14), transparent 60%);
        background-size: 5.5vmin 5.5vmin, 5.5vmin 5.5vmin, 100% 100%;
        background-position: center;
        opacity: 0.24;
      }
      #backdrop::after {
        background: radial-gradient(
          circle at 50% 45%,
          rgba(46, 124, 207, 0.5) 0%,
          rgba(13, 40, 72, 0.22) 38%,
          rgba(5, 7, 13, 0) 72%
        );
        opacity: 0.34;
        transform: scale(0.96);
        animation: identify-pulse 4.8s ease-in-out infinite;
        will-change: opacity, transform;
      }
      @keyframes identify-pulse {
        0% {
          opacity: 0.22;
          transform: scale(0.96);
        }
        50% {
          opacity: 0.58;
          transform: scale(1.03);
        }
        100% {
          opacity: 0.22;
          transform: scale(0.96);
        }
      }
      #nickname,
      #hostname,
      #resolution-label,
      #ips,
      #ips-empty,
      #hint {
        position: relative;
        z-index: 1;
      }
      #resolution-label,
      #hint {
        position: fixed;
        left: 0;
        right: 0;
        font-size: clamp(11px, 1.55vmin, 16px);
        font-weight: 700;
        letter-spacing: 0.02em;
        color: rgba(234, 242, 255, 0.72);
      }
      #resolution-label {
        top: max(3vmin, 24px);
      }
      #brand-icon {
        display: block;
        width: clamp(84px, 14vmin, 144px);
        height: auto;
        margin: 0 auto 2.6vmin;
        filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.72));
        pointer-events: none;
      }
      #nickname {
        font-size: 9vmin;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.01em;
        text-shadow: 0 2px 24px rgba(0, 0, 0, 0.55);
        word-break: break-word;
        max-width: 92vw;
      }
      #hostname {
        font-size: 6vmin;
        font-weight: 600;
        margin-top: 1.5vmin;
        color: #bcd6ff;
        word-break: break-word;
        max-width: 92vw;
      }
      /* When there is no distinct nickname, the hostname becomes the hero text. */
      #hostname.hero {
        font-size: 9vmin;
        font-weight: 800;
        color: #eaf2ff;
        margin-top: 0;
      }
      #ips {
        margin-top: 4vmin;
        display: flex;
        flex-wrap: wrap;
        gap: 2vmin 3vmin;
        align-items: center;
        justify-content: center;
        max-width: 92vw;
      }
      .ip {
        font-size: clamp(12px, 2.2vmin, 18px);
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        padding: 0.65vmin 1.4vmin;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: #ffffff;
      }
      #ips-empty {
        margin-top: 4vmin;
        font-size: clamp(12px, 2vmin, 18px);
        color: #9fb8dc;
      }
      #hint {
        bottom: max(3vmin, 24px);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="backdrop">
      <div id="resolution-label" style="display: none"></div>
      <img id="brand-icon" src="../Images/ui-icon.png" alt="ShowTrak Client" />
      <div id="nickname" style="display: none"></div>
      <div id="hostname"></div>
      <div id="ips"></div>
      <div id="ips-empty" style="display: none">No network address detected</div>
      <div id="hint">Tap anywhere to dismiss</div>
    </div>
    <script src="./identify-overlay.js"></script>
  </body>
</html>
