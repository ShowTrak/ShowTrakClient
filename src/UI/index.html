<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ShowTrak Client</title>
    <link rel="stylesheet" href="./vendors/bootstrap/css/bootstrap.min.css" />
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <div class="dragbar d-flex justify-content-between align-items-center p-2">
      <span></span>
      <span id="APPLICATION_NAVBAR_TITLE">ShowTrak Client</span>
      <img id="APPLICATION_NAVBAR_LOGO" src="../images/ui-icon.png" alt="ShowTrak Logo" />
    </div>
    <div id="APPLICATION_CONTAINER" class="d-grid gap-3 p-4">
      <div class="d-flex justify-content-center">
        <img id="LOGO" src="../images/ui-icon.png" alt="ShowTrak Logo" />
      </div>
      <div id="PROFILE"></div>
      <div id="PROCESS_MONITOR_WARNING" class="alert alert-warning d-none mb-0" role="alert"></div>
      <div id="SERVER_RECOVERY_STATUS" class="alert alert-success mb-0" role="status"></div>

      <div id="MANUAL_SERVER_SECTION" class="bg-ghost rounded text-white px-3 py-2 small d-none">
        <div class="manual-server-row d-flex align-items-center gap-2 flex-wrap">
          <div class="fw-semibold manual-server-label">Manual Server</div>
          <span id="MANUAL_SERVER_STATUS" class="badge bg-secondary">Not Set</span>
          <input
            id="MANUAL_SERVER_HOST"
            type="text"
            class="form-control form-control-sm manual-server-host"
            placeholder="Server IP or hostname"
            autocomplete="off"
            spellcheck="false"
          />
          <input
            id="MANUAL_SERVER_PORT"
            type="number"
            min="1"
            max="65535"
            class="form-control form-control-sm manual-server-port"
            placeholder="3000"
            value="3000"
          />
          <button
            id="BTN_MANUAL_SERVER_SAVE"
            type="button"
            class="btn btn-sm btn-primary manual-server-action"
          >
            Save
          </button>
          <button
            id="BTN_MANUAL_SERVER_CLEAR"
            type="button"
            class="btn btn-sm btn-light manual-server-action d-none"
          >
            Clear
          </button>
        </div>
        <div id="MANUAL_SERVER_HINT" class="text-muted small mt-2 d-none">
          No port entered. The default port is 3000.
        </div>
        <div id="MANUAL_SERVER_ERROR" class="text-danger small mt-2 d-none"></div>
      </div>

      <div class="row g-3">
        <div class="col-6 d-grid">
          <a id="BTN_MINIMIZE" class="btn btn-light"> Minimise </a>
        </div>
        <div class="col-6 d-grid">
          <a id="BTN_SHUTDOWN" class="btn btn-danger"> Stop Service </a>
        </div>
      </div>

      <div class="d-grid">
        <a id="BTN_FACTORY_RESET" class="btn btn-warning"> Factory Reset Client </a>
      </div>

      <div id="UPDATE_SECTION" class="card bg-ghost border-0 rounded d-none text-white">
        <div class="card-body p-2 small">
          <div class="d-flex justify-content-between align-items-center">
            <div class="text-start">
              <div id="UPDATE_STATUS" class="text-muted">No pending update</div>
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-sm btn-success d-none" id="UPDATE_INSTALL_BTN">
                Install & Restart
              </button>
              <button type="button" class="btn btn-sm btn-light d-none" id="UPDATE_LATER_BTN">
                Later
              </button>
            </div>
          </div>
          <div id="UPDATE_NOTES_WRAPPER" class="mt-2 d-none">
            <div class="fw-semibold small mb-1">Changelog</div>
            <div
              id="UPDATE_CHANGELOG"
              class="border-0 rounded bg-ghost p-2 small text-white"
              style="max-height: 160px; overflow: auto; white-space: pre-wrap"
            ></div>
          </div>
        </div>
      </div>

      <div class="d-grid">
        <a id="BTN_CHECK_UPDATES" class="btn btn-secondary"> Check for Updates </a>
      </div>
    </div>
  </body>
  <footer>
    <script src="./vendors/jquery/index.js" defer></script>
    <script src="./vendors/bootstrap/js/bootstrap.bundle.min.js" defer></script>
    <script src="./index.js" defer></script>
  </footer>
</html>
